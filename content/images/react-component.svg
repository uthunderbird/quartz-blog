<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="400" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">React Component Structure</text>
  
  <!-- App Component -->
  <rect x="200" y="60" width="100" height="80" fill="#61dafb" stroke="#21a1c4" stroke-width="2" rx="8"/>
  <text x="250" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">App</text>
  <text x="250" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Root Component</text>
  <text x="250" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">State: user, theme</text>
  
  <!-- Header Component -->
  <rect x="80" y="180" width="80" height="60" fill="#ff6b6b" stroke="#e55353" stroke-width="2" rx="5"/>
  <text x="120" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Header</text>
  <text x="120" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Navigation</text>
  
  <!-- Main Content -->
  <rect x="200" y="180" width="100" height="60" fill="#4ecdc4" stroke="#45b7aa" stroke-width="2" rx="5"/>
  <text x="250" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Main</text>
  <text x="250" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Content Area</text>
  
  <!-- Sidebar -->
  <rect x="320" y="180" width="80" height="60" fill="#ffe66d" stroke="#f4d03f" stroke-width="2" rx="5"/>
  <text x="360" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Sidebar</text>
  <text x="360" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Widgets</text>
  
  <!-- Footer -->
  <rect x="200" y="280" width="100" height="40" fill="#a8e6cf" stroke="#7fcdcd" stroke-width="2" rx="5"/>
  <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Footer</text>
  <text x="250" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Links &amp; Info</text>
  
  <!-- Child Components -->
  <rect x="50" y="300" width="60" height="40" fill="#ff9ff3" stroke="#f368e0" stroke-width="2" rx="5"/>
  <text x="80" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">NavItem</text>
  
  <rect x="130" y="300" width="60" height="40" fill="#ff9ff3" stroke="#f368e0" stroke-width="2" rx="5"/>
  <text x="160" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">NavItem</text>
  
  <rect x="210" y="300" width="60" height="40" fill="#ff9ff3" stroke="#f368e0" stroke-width="2" rx="5"/>
  <text x="240" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Article</text>
  
  <rect x="290" y="300" width="60" height="40" fill="#ff9ff3" stroke="#f368e0" stroke-width="2" rx="5"/>
  <text x="320" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Widget</text>
  
  <rect x="370" y="300" width="60" height="40" fill="#ff9ff3" stroke="#f368e0" stroke-width="2" rx="5"/>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Widget</text>
  
  <!-- Arrows showing relationships -->
  <path d="M250 140 L120 180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M250 140 L250 180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M250 140 L360 180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M250 140 L250 280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <path d="M120 240 L80 300" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M120 240 L160 300" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M250 240 L240 300" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M360 240 L320 300" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M360 240 L400 300" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>
