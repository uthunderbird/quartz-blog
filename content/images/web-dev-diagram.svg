<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Web Development Journey</text>
  
  <!-- HTML/CSS Box -->
  <rect x="50" y="60" width="100" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2">HTML &amp; CSS</text>
  <text x="100" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1976d2">Foundation</text>
  
  <!-- JavaScript Box -->
  <rect x="200" y="60" width="100" height="60" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="5"/>
  <text x="250" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f57c00">JavaScript</text>
  <text x="250" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f57c00">Interactivity</text>
  
  <!-- React Box -->
  <rect x="50" y="150" width="100" height="60" fill="#e8f5e8" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4caf50">React</text>
  <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">Frontend</text>
  
  <!-- API Box -->
  <rect x="200" y="150" width="100" height="60" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="5"/>
  <text x="250" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e91e63">API</text>
  <text x="250" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e91e63">Backend</text>
  
  <!-- Database Box -->
  <rect x="125" y="240" width="100" height="40" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
  <text x="175" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9c27b0">Database</text>
  
  <!-- Arrows -->
  <path d="M100 120 L100 150" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M250 120 L250 150" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M100 210 L175 240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M250 210 L175 240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>
